<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SplitHome</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f11; font-family: 'DM Sans', sans-serif; }
    #root { min-height: 100vh; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- React -->

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (transpiles JSX in the browser) -->

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase App + Realtime Database (compat SDK) -->

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ─── 🔥 FIREBASE CONFIG ────────────────────────────────────────────────────
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyDTYGGRLwpAd1GAgu2Lhpn6FTTKlJNxQUI",
      authDomain:        "home-split-260d1.firebaseapp.com",
      databaseURL:       "https://home-split-260d1-default-rtdb.firebaseio.com",
      projectId:         "home-split-260d1",
      storageBucket:     "home-split-260d1.firebasestorage.app",
      messagingSenderId: "165920459097",
      appId:             "1:165920459097:web:f76d279099b36adbfb2448",
    };
    // ──────────────────────────────────────────────────────────────────────────

    // Initialise Firebase once
    const fbApp = firebase.apps.length
      ? firebase.apps[0]
      : firebase.initializeApp(FIREBASE_CONFIG);
    const db = fbApp.database();

    function fbSet(path, value) {
      return db.ref(path).set(value);
    }
    function fbWatch(path, cb) {
      const ref = db.ref(path);
      ref.on("value", snap => cb(snap.val()));
      return () => ref.off("value");
    }

    // ─── Storage hook ──────────────────────────────────────────────────────────
    function useSharedStorage(key, defaultVal) {
      const [value,   setValue]   = useState(defaultVal);
      const [loading, setLoading] = useState(true);
      const [synced,  setSynced]  = useState(false);
      const lsKey  = `splithome_${key}`;
      const fbPath = `splithome/${key}`;
      const unsubRef = useRef(null);

      useEffect(() => {
        let firstCall = true;
        unsubRef.current = fbWatch(fbPath, (val) => {
          if (val !== null && val !== undefined) {
            try {
              const parsed = typeof val === "string" ? JSON.parse(val) : val;
              setValue(parsed);
              try { localStorage.setItem(lsKey, JSON.stringify(parsed)); } catch {}
            } catch {}
          } else if (firstCall) {
            // Nothing in Firebase yet — seed from localStorage if available
            try {
              const ls = localStorage.getItem(lsKey);
              if (ls) {
                const parsed = JSON.parse(ls);
                setValue(parsed);
                // Write it up to Firebase so others see it too
                fbSet(fbPath, ls).catch(() => {});
              }
            } catch {}
          }
          if (firstCall) { firstCall = false; setLoading(false); setSynced(true); }
        });
        return () => { if (unsubRef.current) unsubRef.current(); };
      }, [fbPath, lsKey]);

      const set = useCallback((updater) => {
        setValue(prev => {
          const next = typeof updater === "function" ? updater(prev) : updater;
          const json = JSON.stringify(next);
          fbSet(fbPath, json).catch(err => console.warn("Firebase write failed:", err));
          try { localStorage.setItem(lsKey, json); } catch {}
          return next;
        });
      }, [fbPath, lsKey]);

      return [value, set, loading, synced];
    }

    // ─── Constants ────────────────────────────────────────────────────────────
    const COLORS = {
      bg:"#0f0f11", surface:"#17171c", card:"#1e1e26", border:"#2a2a38",
      accent:"#7c6af7", accentLight:"#a99bf9", accentDim:"#2e2860",
      green:"#4ade80", red:"#f87171", yellow:"#fbbf24", blue:"#60a5fa",
      orange:"#fb923c", teal:"#2dd4bf", pink:"#f472b6",
      text:"#e8e8f0", muted:"#8888a8",
    };
    const MEMBER_COLORS = ["#7c6af7","#2dd4bf","#f472b6","#fb923c","#60a5fa","#4ade80"];
    const GROUP_PALETTE = ["#e879f9","#22d3ee","#a3e635","#f97316","#38bdf8","#fb7185","#fbbf24","#34d399"];
    const DEFAULT_CATEGORIES = [
      {label:"🏠 Rent / Mortgage",value:"rent"},{label:"⚡ Utilities",value:"utilities"},
      {label:"🛒 Groceries",value:"groceries"},{label:"🍔 Dining Out",value:"dining"},
      {label:"🚗 Transport",value:"transport"},{label:"🧹 Household",value:"household"},
      {label:"📺 Subscriptions",value:"subscriptions"},{label:"🏥 Health",value:"health"},
      {label:"🎉 Entertainment",value:"entertainment"},{label:"📦 Other",value:"other"},
    ];
    const EMOJI_OPTIONS = ["🏷️","🍕","🐶","✈️","🎮","📚","💪","🎵","👗","🧴","🏋️","🌿","☕","🎁","🏖️","🔧","💻","📱","🚿","🧺","💡","🎨","🍺","🎓","🏡","🐱","🌍","🚴","🎯","💰"];
    const RECUR_FREQS = [
      {label:"Weekly",value:"weekly",perMonth:4.33},{label:"Bi-weekly",value:"biweekly",perMonth:2.17},
      {label:"Monthly",value:"monthly",perMonth:1},{label:"Quarterly",value:"quarterly",perMonth:1/3},
      {label:"Annually",value:"annually",perMonth:1/12},
    ];
    const UNPAID = "__unpaid__";

    // ─── Helpers ──────────────────────────────────────────────────────────────
    const catLabel     = (v,cats)=>(cats||DEFAULT_CATEGORIES).find(c=>c.value===v)?.label??v;
    const freqLabel    = v=>RECUR_FREQS.find(f=>f.value===v)?.label??v;
    const freqPerMonth = v=>RECUR_FREQS.find(f=>f.value===v)?.perMonth??1;
    const fmt          = n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(n??0);
    const fmtDate      = iso=>new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    const today        = new Date();
    const thisMonth    = today.toISOString().slice(0,7);
    const memberColor  = (members,name)=>MEMBER_COLORS[members.indexOf(name)%MEMBER_COLORS.length];
    const isPaid       = e=>e.paidBy&&e.paidBy!==UNPAID;
    const memberGroup  = (groups,name)=>groups.find(g=>g.members.includes(name))??null;
    const entityColor  = (groups,members,name)=>{const g=memberGroup(groups,name);return g?g.color:memberColor(members,name);};
    const getEntities  = (members,groups)=>{
      const grouped=new Set(groups.flatMap(g=>g.members));
      const solos=members.filter(m=>!grouped.has(m));
      return [...solos.map(m=>({id:m,label:m,type:"individual",color:memberColor(members,m),members:[m]})),
              ...groups.map(g=>({id:g.id,label:`👨‍👩‍👧 ${g.name}`,type:"group",color:g.color,members:g.members}))];
    };
    const resolvePayers=(paidBy,amount,groups)=>{
      if(!paidBy||paidBy===UNPAID)return{};
      const grp=groups.find(g=>g.id===paidBy);
      if(grp){const share=amount/grp.members.length;const r={};grp.members.forEach(m=>{r[m]=+share.toFixed(2)});return r;}
      return{[paidBy]:amount};
    };
    const resolveEntityMembers=(id,groups)=>{const g=groups.find(g=>g.id===id);return g?g.members:[id];};
    const paidByLabel=(paidBy,groups)=>{if(!paidBy||paidBy===UNPAID)return"Unpaid";const g=groups.find(g=>g.id===paidBy);return g?`👨‍👩‍👧 ${g.name}`:paidBy;};
    const paidByColor=(paidBy,groups,members)=>{if(!paidBy||paidBy===UNPAID)return COLORS.red;const g=groups.find(g=>g.id===paidBy);return g?g.color:memberColor(members,paidBy);};
    const entityDisplayLabel=(id,groups)=>{const g=groups.find(g=>g.id===id);return g?`👨‍👩‍👧 ${g.name}`:id;};
    const entityIdColor=(id,groups,members)=>{const g=groups.find(g=>g.id===id);return g?g.color:memberColor(members,id);};

    // ─── UI primitives ────────────────────────────────────────────────────────
    function Tag({children,color=COLORS.accent}){return <span style={{display:"inline-block",padding:"2px 9px",borderRadius:99,background:color+"22",color,fontSize:11,fontWeight:700,letterSpacing:"0.04em",textTransform:"uppercase"}}>{children}</span>;}
    function Pill({active,onClick,children,small,color=COLORS.accent}){return <button onClick={onClick} style={{padding:small?"4px 12px":"6px 16px",borderRadius:99,background:active?color:COLORS.card,color:active?"#fff":COLORS.muted,border:`1px solid ${active?color:COLORS.border}`,cursor:"pointer",fontSize:small?12:13,fontWeight:600,transition:"all 0.15s",fontFamily:"inherit"}}>{children}</button>;}
    function Input({label,...props}){return(<div style={{display:"flex",flexDirection:"column",gap:5}}>{label&&<label style={{fontSize:12,color:COLORS.muted,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}}>{label}</label>}<input {...props} style={{background:COLORS.surface,border:`1px solid ${COLORS.border}`,borderRadius:8,padding:"9px 13px",color:COLORS.text,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit",...props.style}}/></div>);}
    function Select({label,children,...props}){return(<div style={{display:"flex",flexDirection:"column",gap:5}}>{label&&<label style={{fontSize:12,color:COLORS.muted,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}}>{label}</label>}<select {...props} style={{background:COLORS.surface,border:`1px solid ${COLORS.border}`,borderRadius:8,padding:"9px 13px",color:COLORS.text,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit",cursor:"pointer",...props.style}}>{children}</select></div>);}
    function Card({children,style}){return <div style={{background:COLORS.card,border:`1px solid ${COLORS.border}`,borderRadius:14,padding:"20px 22px",...style}}>{children}</div>;}
    function StatBox({label,value,sub,color=COLORS.text,accent}){return(<Card style={{flex:1,minWidth:130,borderLeft:accent?`3px solid ${accent}`:undefined}}><div style={{fontSize:11,color:COLORS.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>{label}</div><div style={{fontSize:22,fontWeight:800,color,fontFamily:"'DM Mono',monospace"}}>{value}</div>{sub&&<div style={{fontSize:12,color:COLORS.muted,marginTop:4}}>{sub}</div>}</Card>);}

    function ShareBar({shares,members,groups}){
      const entries=Object.entries(shares).filter(([,v])=>v>0);
      if(!entries.length)return null;
      return(<div style={{marginTop:10}}><div style={{height:5,borderRadius:99,overflow:"hidden",display:"flex",gap:1}}>{entries.map(([m,v])=><div key={m} style={{flex:v,background:entityColor(groups,members,m),minWidth:3}}/>)}</div><div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:6}}>{entries.map(([m,v])=><span key={m} style={{fontSize:11,color:entityColor(groups,members,m),fontFamily:"'DM Mono',monospace"}}>{m} {fmt(v)}</span>)}</div></div>);
    }

    // ─── EntitySelect (top-level — never inside another component) ────────────
    function EntitySelect({label,value,onChange,members,groups}){
      return(<div style={{display:"flex",flexDirection:"column",gap:5}}>{label&&<label style={{fontSize:12,color:COLORS.muted,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}}>{label}</label>}<select value={value} onChange={e=>onChange(e.target.value)} style={{background:COLORS.surface,border:`1px solid ${COLORS.border}`,borderRadius:8,padding:"9px 13px",color:COLORS.text,fontSize:14,outline:"none",fontFamily:"inherit",cursor:"pointer",width:"100%",boxSizing:"border-box"}}>{groups.length>0&&<optgroup label="Family Groups">{groups.map(g=><option key={g.id} value={g.id}>👨‍👩‍👧 {g.name}</option>)}</optgroup>}<optgroup label="Individuals">{members.map(m=><option key={m} value={m}>{m}</option>)}</optgroup></select></div>);
    }

    // ─── Family Group Manager ─────────────────────────────────────────────────
    function FamilyManager({groups,members,onChange,onClose}){
      const [name,setName]=useState("");const [color,setColor]=useState(GROUP_PALETTE[0]);const [picked,setPicked]=useState([]);const [editId,setEditId]=useState(null);
      const usedMembers=groups.flatMap(g=>g.id===editId?[]:g.members);
      const startNew=()=>{setName("");setColor(GROUP_PALETTE[groups.length%GROUP_PALETTE.length]);setPicked([]);setEditId("__new__");};
      const startEdit=g=>{setName(g.name);setColor(g.color);setPicked([...g.members]);setEditId(g.id);};
      const cancel=()=>setEditId(null);
      const save=()=>{if(!name.trim()||picked.length<1)return;if(editId==="__new__"){onChange([...groups,{id:"grp_"+Date.now(),name:name.trim(),color,members:picked}]);}else{onChange(groups.map(g=>g.id===editId?{...g,name:name.trim(),color,members:picked}:g));}setEditId(null);};
      const remove=id=>{if(!window.confirm("Remove this family group?"))return;onChange(groups.filter(g=>g.id!==id));};
      const toggleMember=m=>{if(usedMembers.includes(m))return;setPicked(p=>p.includes(m)?p.filter(x=>x!==m):[...p,m]);};
      return(<div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
        <div style={{background:COLORS.card,border:`1px solid ${COLORS.border}`,borderRadius:18,padding:24,maxWidth:500,width:"100%",maxHeight:"88vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><h2 style={{margin:0,fontSize:18,fontWeight:900,color:COLORS.text}}>👨‍👩‍👧 Family Groups</h2><button onClick={onClose} style={{background:"none",border:"none",color:COLORS.muted,fontSize:22,cursor:"pointer",lineHeight:1}}>×</button></div>
          <div style={{fontSize:13,color:COLORS.muted,background:COLORS.surface,borderRadius:10,padding:"10px 14px",borderLeft:`3px solid ${COLORS.accent}`}}>Group roommates into a family unit. Expenses assigned to a group split equally among members.</div>
          {groups.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8}}>{groups.map(g=><div key={g.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:COLORS.surface,borderRadius:12,border:`1px solid ${g.color}44`}}><div style={{width:12,height:12,borderRadius:99,background:g.color,flexShrink:0}}/><div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,color:COLORS.text,fontSize:14}}>{g.name}</div><div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>{g.members.map(m=><span key={m} style={{fontSize:11,padding:"1px 8px",borderRadius:99,background:g.color+"22",color:g.color,fontWeight:700}}>{m}</span>)}</div></div><button onClick={()=>startEdit(g)} style={{background:"none",border:`1px solid ${COLORS.border}`,borderRadius:7,padding:"4px 10px",color:COLORS.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Edit</button><button onClick={()=>remove(g.id)} style={{background:"none",border:"none",color:COLORS.red+"99",fontSize:18,cursor:"pointer",lineHeight:1}}>×</button></div>)}</div>}
          {groups.length===0&&!editId&&<div style={{textAlign:"center",color:COLORS.muted,fontSize:13}}>No family groups yet.</div>}
          {editId&&<div style={{background:COLORS.surface,borderRadius:12,padding:16,display:"flex",flexDirection:"column",gap:14,border:`1px solid ${color}44`}}>
            <div style={{fontSize:13,fontWeight:700,color:COLORS.text}}>{editId==="__new__"?"New Family Group":"Edit Group"}</div>
            <Input label="Group Name" placeholder='e.g. "The Johnsons"' value={name} onChange={e=>setName(e.target.value)}/>
            <div><div style={{fontSize:12,color:COLORS.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Color</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{GROUP_PALETTE.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:28,height:28,borderRadius:99,background:c,border:`3px solid ${color===c?"#fff":"transparent"}`,cursor:"pointer"}}/>)}</div></div>
            <div><div style={{fontSize:12,color:COLORS.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Members</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{members.map((m,i)=>{const inOther=usedMembers.includes(m);const active=picked.includes(m);return(<button key={m} onClick={()=>toggleMember(m)} disabled={inOther} style={{padding:"5px 14px",borderRadius:99,background:active?color+"33":COLORS.card,border:`1px solid ${active?color:inOther?COLORS.border+"55":COLORS.border}`,color:active?color:inOther?COLORS.muted+"55":COLORS.muted,fontWeight:700,fontSize:12,cursor:inOther?"not-allowed":"pointer",fontFamily:"inherit",opacity:inOther?0.4:1}}>{m}{inOther?" (in another group)":""}</button>);})}</div>{picked.length<1&&<div style={{fontSize:12,color:COLORS.red,marginTop:6}}>Select at least 1 member.</div>}</div>
            <div style={{display:"flex",gap:8}}><button onClick={save} disabled={!name.trim()||picked.length<1} style={{flex:1,background:name.trim()&&picked.length>=1?color:COLORS.accentDim,border:"none",borderRadius:10,padding:"11px",color:"#fff",fontWeight:700,fontSize:14,cursor:name.trim()&&picked.length>=1?"pointer":"default",fontFamily:"inherit"}}>{editId==="__new__"?"Create Group":"Save Changes"}</button><button onClick={cancel} style={{background:"none",border:`1px solid ${COLORS.border}`,borderRadius:10,padding:"11px 18px",color:COLORS.muted,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button></div>
          </div>}
          {!editId&&<button onClick={startNew} style={{background:COLORS.accent,border:"none",borderRadius:10,padding:"11px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>+ Create Family Group</button>}
        </div>
      </div>);
    }

    // ─── Category Manager ─────────────────────────────────────────────────────
    function CategoryManager({customCategories,onChange,onClose}){
      const [newEmoji,setNewEmoji]=useState("🏷️");const [newName,setNewName]=useState("");const [showPicker,setShowPicker]=useState(null);
      const [editId,setEditId]=useState(null);const [editName,setEditName]=useState("");const [editEmoji,setEditEmoji]=useState("");
      const add=()=>{const name=newName.trim();if(!name)return;onChange([...customCategories,{label:`${newEmoji} ${name}`,value:"custom_"+Date.now(),emoji:newEmoji,name}]);setNewName("");setShowPicker(null);};
      const remove=val=>{if(!window.confirm("Remove category?"))return;onChange(customCategories.filter(c=>c.value!==val));};
      const startEdit=c=>{setEditId(c.value);setEditName(c.name);setEditEmoji(c.emoji);};
      const saveEdit=()=>{const name=editName.trim();if(!name)return;onChange(customCategories.map(c=>c.value===editId?{...c,name,emoji:editEmoji,label:`${editEmoji} ${name}`}:c));setEditId(null);};
      return(<div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
        <div style={{background:COLORS.card,border:`1px solid ${COLORS.border}`,borderRadius:18,padding:24,maxWidth:480,width:"100%",maxHeight:"85vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><h2 style={{margin:0,fontSize:18,fontWeight:900,color:COLORS.text}}>Manage Categories</h2><button onClick={onClose} style={{background:"none",border:"none",color:COLORS.muted,fontSize:22,cursor:"pointer",lineHeight:1}}>×</button></div>
          <div><div style={{fontSize:11,color:COLORS.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Default</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{DEFAULT_CATEGORIES.map(c=><span key={c.value} style={{padding:"5px 12px",borderRadius:99,background:COLORS.surface,border:`1px solid ${COLORS.border}`,fontSize:12,color:COLORS.muted}}>{c.label}</span>)}</div></div>
          <div><div style={{fontSize:11,color:COLORS.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Custom</div>
            {customCategories.length===0&&<div style={{fontSize:13,color:COLORS.muted}}>None yet.</div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>{customCategories.map(c=><div key={c.value} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:COLORS.surface,borderRadius:10,border:`1px solid ${COLORS.border}`}}>
              {editId===c.value?(<><button onClick={()=>setShowPicker(p=>p===c.value?null:c.value)} style={{fontSize:22,background:"none",border:`1px solid ${COLORS.border}`,borderRadius:8,padding:"2px 6px",cursor:"pointer"}}>{editEmoji}</button>
                {showPicker===c.value&&<div style={{position:"absolute",background:COLORS.card,border:`1px solid ${COLORS.border}`,borderRadius:12,padding:10,display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4,zIndex:10,boxShadow:"0 8px 32px #00000088"}}>{EMOJI_OPTIONS.map(e=><button key={e} onClick={()=>{setEditEmoji(e);setShowPicker(null);}} style={{fontSize:18,background:"none",border:"none",cursor:"pointer",borderRadius:6,padding:4}}>{e}</button>)}</div>}
                <input value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEdit()} style={{flex:1,background:COLORS.card,border:`1px solid ${COLORS.accent}`,borderRadius:7,padding:"6px 10px",color:COLORS.text,fontSize:14,outline:"none",fontFamily:"inherit"}} autoFocus/>
                <button onClick={saveEdit} style={{background:COLORS.accent,border:"none",borderRadius:7,padding:"5px 12px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Save</button>
                <button onClick={()=>setEditId(null)} style={{background:"none",border:"none",color:COLORS.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button></>)
              :(<><span style={{fontSize:20}}>{c.emoji}</span><span style={{flex:1,fontSize:14,color:COLORS.text,fontWeight:600}}>{c.name}</span><button onClick={()=>startEdit(c)} style={{background:"none",border:`1px solid ${COLORS.border}`,borderRadius:7,padding:"4px 10px",color:COLORS.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Edit</button><button onClick={()=>remove(c.value)} style={{background:"none",border:"none",color:COLORS.red+"99",fontSize:18,cursor:"pointer",lineHeight:1}}>×</button></>)}
            </div>)}</div>
          </div>
          <div style={{borderTop:`1px solid ${COLORS.border}`,paddingTop:16}}>
            <div style={{fontSize:11,color:COLORS.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}}>Add New</div>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>

    // ─── Split Builder ────────────────────────────────────────────────────────
    function SplitBuilder({members,groups,amount,value,onChange}){
      const totalAmt=parseFloat(amount)||0;
      const participants=value.participants||members;
      const mode=value.mode||"equal";
      const customAmts=value.amounts||{};
      const equalShare=participants.length>0?totalAmt/participants.length:0;
      const customTotal=participants.reduce((s,p)=>s+(parseFloat(customAmts[p])||0),0);
      const remainder=+(totalAmt-customTotal).toFixed(2);
      const isBalanced=Math.abs(remainder)<0.01;
      const mkValue=(pts,m,amts)=>({type:pts.length===members.length?"household":"custom",participants:pts,mode:m,amounts:amts||{}});
      const toggleParticipant=name=>{if(participants.includes(name)){if(participants.length<=1)return;onChange(mkValue(participants.filter(p=>p!==name),mode,{}));}else{onChange(mkValue([...participants,name],mode,{}));}};
      const toggleAll=()=>{const next=participants.length===members.length?[members[0]]:[...members];onChange(mkValue(next,mode,{}));};
      const selectGroup=g=>{const allIn=g.members.every(m=>participants.includes(m));let next;if(allIn){next=participants.filter(m=>!g.members.includes(m));if(next.length===0)next=[members[0]];}else{next=[...new Set([...participants.filter(m=>!g.members.includes(m)),...g.members])];}onChange(mkValue(next,mode,{}));};
      const setMode=m=>onChange({...value,mode:m,amounts:{}});
      const setCustomAmount=(name,val)=>onChange({...value,amounts:{...customAmts,[name]:val}});
      const autoFill=()=>{const zeros=participants.filter(p=>!(parseFloat(customAmts[p])>0));if(!zeros.length||remainder<=0)return;const share=+(remainder/zeros.length).toFixed(2);const newAmts={...customAmts};zeros.forEach((p,i)=>{newAmts[p]=i===zeros.length-1?+(remainder-share*(zeros.length-1)).toFixed(2):share;});onChange({...value,amounts:newAmts});};
      return(<div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div><div style={{fontSize:12,color:COLORS.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Who owes?</div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
            <button onClick={toggleAll} style={{padding:"5px 13px",borderRadius:99,background:participants.length===members.length?COLORS.accent+"33":COLORS.surface,border:`1px solid ${participants.length===members.length?COLORS.accent:COLORS.border}`,color:participants.length===members.length?COLORS.accentLight:COLORS.muted,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🏠 Everyone</button>
            {groups.map(g=>{const allIn=g.members.every(m=>participants.includes(m));return(<button key={g.id} onClick={()=>selectGroup(g)} style={{padding:"5px 13px",borderRadius:99,background:allIn?g.color+"33":COLORS.surface,border:`1px solid ${allIn?g.color:COLORS.border}`,color:allIn?g.color:COLORS.muted,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>👨‍👩‍👧 {g.name}</button>);})}
            {members.map((m,i)=>{const mc=MEMBER_COLORS[i%MEMBER_COLORS.length];const active=participants.includes(m);return(<button key={m} onClick={()=>toggleParticipant(m)} style={{padding:"5px 13px",borderRadius:99,background:active?mc+"22":COLORS.surface,border:`1px solid ${active?mc:COLORS.border}`,color:active?mc:COLORS.muted,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}>{m}</button>);})}
          </div>
        </div>
        <div><div style={{fontSize:12,color:COLORS.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>How to split?</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setMode("equal")} style={{flex:1,padding:"9px",borderRadius:10,background:mode==="equal"?COLORS.accent:COLORS.surface,border:`1px solid ${mode==="equal"?COLORS.accent:COLORS.border}`,color:mode==="equal"?"#fff":COLORS.muted,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>÷ Equal</button>
            <button onClick={()=>setMode("custom")} style={{flex:1,padding:"9px",borderRadius:10,background:mode==="custom"?COLORS.orange:COLORS.surface,border:`1px solid ${mode==="custom"?COLORS.orange:COLORS.border}`,color:mode==="custom"?"#fff":COLORS.muted,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>$ Custom</button>
          </div>
        </div>
        {mode==="equal"&&participants.length>0&&totalAmt>0&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{participants.map(p=>{const mc=entityColor(groups,members,p);return(<div key={p} style={{flex:1,minWidth:90,background:COLORS.surface,borderRadius:10,padding:"8px 12px",textAlign:"center",border:`1px solid ${mc}33`}}><div style={{fontSize:11,color:COLORS.muted,marginBottom:3}}>{p}</div><div style={{fontSize:15,fontWeight:800,color:mc,fontFamily:"'DM Mono',monospace"}}>{fmt(equalShare)}</div></div>);})}</div>}
        {mode==="custom"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8}}>{participants.map(p=>{const mc=entityColor(groups,members,p);return(<div key={p} style={{background:COLORS.surface,borderRadius:10,padding:"10px 12px",border:`1px solid ${mc}44`}}><div style={{fontSize:12,color:mc,fontWeight:700,marginBottom:6}}>{p}</div><div style={{position:"relative"}}><span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:COLORS.muted,fontSize:13}}>$</span><input type="number" min="0" step="0.01" placeholder={fmt(equalShare).replace("$","")} value={customAmts[p]??""} onChange={e=>setCustomAmount(p,e.target.value)} style={{background:COLORS.card,border:`1px solid ${COLORS.border}`,borderRadius:7,padding:"7px 10px 7px 22px",color:COLORS.text,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"'DM Mono',monospace"}}/></div></div>);})}</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:isBalanced?COLORS.green+"11":COLORS.red+"11",borderRadius:10,border:`1px solid ${isBalanced?COLORS.green+"44":COLORS.red+"44"}`}}>
            <span style={{fontSize:13,color:isBalanced?COLORS.green:COLORS.red,fontWeight:700}}>{isBalanced?"✓ Amounts balance":`${remainder>0?"+":""}${fmt(remainder)} unassigned`}</span>
            {!isBalanced&&remainder>0&&<button onClick={autoFill} style={{background:COLORS.orange,border:"none",borderRadius:7,padding:"5px 12px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Auto-fill</button>}
          </div>
        </div>}
      </div>);
    }

      const submitOne=()=>{if(!canOne())return;const amt=parseFloat(form.amount);const shares=buildShares(form.split,amt);flash(()=>{onAdd({id:Date.now().toString(),...form,amount:amt,shares,participants:form.split.participants,createdAt:new Date().toISOString()});setForm(f=>({...f,amount:"",description:"",split:defaultSplit()}));});};
      const submitRecur=()=>{if(!canRecur())return;const amt=parseFloat(rForm.amount);const shares=buildShares(rForm.split,amt);flash(()=>{onAddRecurring({id:Date.now().toString(),...rForm,amount:amt,shares,participants:rForm.split.participants,createdAt:new Date().toISOString(),active:true});setRForm(r=>({...r,amount:"",description:"",split:defaultSplit()}));});};
      const paidBySelect=(val,onChange)=>(<Select label="Paid by" value={val} onChange={onChange}><option value={UNPAID}>⏳ Unpaid</option>{groups.length>0&&<optgroup label="Family Group">{groups.map(g=><option key={g.id} value={g.id}>👨‍👩‍👧 {g.name} ({g.members.join(", ")})</option>)}</optgroup>}<optgroup label="Individual">{members.map(m=><option key={m} value={m}>{m}</option>)}</optgroup></Select>);
      const catSelect=(val,onChange)=>(<div><Select label="Category" value={val} onChange={onChange}><optgroup label="Default">{DEFAULT_CATEGORIES.map(c=><option key={c.value} value={c.value}>{c.label}</option>)}</optgroup>{customCategories.length>0&&<optgroup label="Custom">{customCategories.map(c=><option key={c.value} value={c.value}>{c.label}</option>)}</optgroup>}</Select><button onClick={onManageCategories} style={{background:"none",border:"none",color:COLORS.accent,fontSize:12,cursor:"pointer",fontFamily:"inherit",marginTop:5,padding:0}}>+ Manage categories</button></div>);
      return(<div style={{maxWidth:560,margin:"0 auto",display:"flex",flexDirection:"column",gap:18}}>

        <div style={{display:"flex",gap:8}}><Pill active={tab==="one-time"} onClick={()=>{setTab("one-time");setSuccess(false);}}>💸 One-time</Pill><Pill active={tab==="recurring"} onClick={()=>{setTab("recurring");setSuccess(false);}}>🔁 Recurring</Pill></div>
        {tab==="one-time"&&<Card><div style={{display:"flex",flexDirection:"column",gap:16}}><h3 style={{margin:0,fontSize:16,fontWeight:800,color:COLORS.text}}>Add One-Time Expense</h3><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><Input label="Amount ($)" type="number" placeholder="0.00" value={form.amount} onChange={e=>set("amount",e.target.value)}/><Input label="Date" type="date" value={form.date} onChange={e=>set("date",e.target.value)}/></div><Input label="Description" placeholder="e.g. Weekly groceries" value={form.description} onChange={e=>set("description",e.target.value)}/>{catSelect(form.category,e=>set("category",e.target.value))}{paidBySelect(form.paidBy,e=>set("paidBy",e.target.value))}<div style={{borderTop:`1px solid ${COLORS.border}`,paddingTop:16}}><SplitBuilder members={members} groups={groups} amount={form.amount} value={form.split} onChange={v=>set("split",v)}/></div><button onClick={submitOne} disabled={!canOne()} style={{background:success?COLORS.green:canOne()?COLORS.accent:COLORS.accentDim,border:"none",borderRadius:10,padding:"13px",color:"#fff",fontWeight:700,fontSize:15,cursor:canOne()?"pointer":"default",fontFamily:"inherit",transition:"background 0.3s"}}>{success?"✓ Added!":"Submit Expense"}</button></div></Card>}
        {tab==="recurring"&&<Card><div style={{display:"flex",flexDirection:"column",gap:16}}><h3 style={{margin:0,fontSize:16,fontWeight:800,color:COLORS.text}}>Add Recurring Expense</h3><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><Input label="Amount ($)" type="number" placeholder="0.00" value={rForm.amount} onChange={e=>rSet("amount",e.target.value)}/><Input label="Start Date" type="date" value={rForm.startDate} onChange={e=>rSet("startDate",e.target.value)}/></div><Input label="Description" placeholder="e.g. Netflix, Rent" value={rForm.description} onChange={e=>rSet("description",e.target.value)}/>{catSelect(rForm.category,e=>rSet("category",e.target.value))}<Select label="Frequency" value={rForm.frequency} onChange={e=>rSet("frequency",e.target.value)}>{RECUR_FREQS.map(f=><option key={f.value} value={f.value}>{f.label}</option>)}</Select>{paidBySelect(rForm.paidBy,e=>rSet("paidBy",e.target.value))}<div style={{borderTop:`1px solid ${COLORS.border}`,paddingTop:16}}><SplitBuilder members={members} groups={groups} amount={rForm.amount} value={rForm.split} onChange={v=>rSet("split",v)}/></div><button onClick={submitRecur} disabled={!canRecur()} style={{background:success?COLORS.green:canRecur()?COLORS.teal:"#1a3a38",border:"none",borderRadius:10,padding:"13px",color:canRecur()?"#000":COLORS.muted,fontWeight:700,fontSize:15,cursor:canRecur()?"pointer":"default",fontFamily:"inherit",transition:"background 0.3s"}}>{success?"✓ Added!":"Add Recurring Expense"}</button></div></Card>}
      </div>);

    function ExpensesView({expenses,recurringExpenses,members,groups,currentUser,onDeleteRecurring,onEditExpense,onDeleteExpense,onEditRecurring,onMarkPaid,allCategories}){
      const [tab,setTab]=useState("one-time");const [filter,setFilter]=useState("all");const [catFilter,setCatFilter]=useState("all");const [search,setSearch]=useState("");const [editing,setEditing]=useState(null);
      const entities=getEntities(members,groups);const cl=v=>catLabel(v,allCategories);
      const matchesFilter=e=>{if(filter==="unpaid")return!isPaid(e);if(filter==="all")return true;if(filter==="mine"){const payers=resolvePayers(e.paidBy,e.amount,groups);return e.participants?.includes(currentUser)||payers[currentUser]!==undefined;}const grp=groups.find(g=>g.id===filter);if(grp){const payers=resolvePayers(e.paidBy,e.amount,groups);return grp.members.some(m=>e.participants?.includes(m)||payers[m]!==undefined);}const payers=resolvePayers(e.paidBy,e.amount,groups);return e.participants?.includes(filter)||payers[filter]!==undefined;};
      const filtered=expenses.filter(matchesFilter).filter(e=>catFilter==="all"||e.category===catFilter).filter(e=>!search||e.description.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>new Date(b.date)-new Date(a.date));
      const unpaidCount=expenses.filter(e=>!isPaid(e)).length;
      return(<div style={{maxWidth:700,margin:"0 auto",display:"flex",flexDirection:"column",gap:16}}>
        {editing&&<EditExpenseModal expense={editing.expense} isRecurring={editing.isRecurring} members={members} groups={groups} allCategories={allCategories} onSave={updated=>{if(editing.isRecurring)onEditRecurring(updated);else onEditExpense(updated);setEditing(null);}} onDelete={id=>{if(editing.isRecurring)onDeleteRecurring(id);else onDeleteExpense(id);setEditing(null);}} onClose={()=>setEditing(null)}/>}
        <div style={{display:"flex",gap:8}}><Pill active={tab==="one-time"} onClick={()=>setTab("one-time")}>💸 One-time</Pill><Pill active={tab==="recurring"} onClick={()=>setTab("recurring")}>🔁 Recurring</Pill></div>
        {tab==="one-time"&&<>
          <Card><div style={{display:"flex",flexDirection:"column",gap:12}}>
            <Input placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)}/>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}><Pill small active={filter==="all"} onClick={()=>setFilter("all")}>All</Pill><Pill small active={filter==="unpaid"} onClick={()=>setFilter("unpaid")} color={COLORS.red}>⏳ Unpaid{unpaidCount>0?` (${unpaidCount})`:""}</Pill><Pill small active={filter==="mine"} onClick={()=>setFilter("mine")}>Mine</Pill>{entities.map(en=><button key={en.id} onClick={()=>setFilter(en.id)} style={{padding:"4px 12px",borderRadius:99,background:filter===en.id?en.color+"33":COLORS.surface,color:filter===en.id?en.color:COLORS.muted,border:`1px solid ${filter===en.id?en.color:COLORS.border}`,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>{en.label}</button>)}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}><Pill small active={catFilter==="all"} onClick={()=>setCatFilter("all")}>All</Pill>{allCategories.map(c=><Pill small key={c.value} active={catFilter===c.value} onClick={()=>setCatFilter(c.value)}>{c.label.split(" ")[0]}</Pill>)}</div>
          </div></Card>
          {filtered.length===0?<div style={{textAlign:"center",color:COLORS.muted,padding:40}}>No expenses found.</div>:filtered.map(e=>{
            const shares=e.shares||{};const participants=e.participants||members;const isCustom=e.split?.mode==="custom";const paid=isPaid(e);
            return(<Card key={e.id} style={{borderLeft:!paid?`3px solid ${COLORS.red}`:undefined}}>
              <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                <div style={{fontSize:26,marginTop:2}}>{cl(e.category).split(" ")[0]}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><span style={{fontWeight:700,color:COLORS.text,fontSize:15}}>{e.description}</span><span style={{fontWeight:800,color:paid?COLORS.green:COLORS.red,fontFamily:"'DM Mono',monospace",fontSize:16}}>{fmt(e.amount)}</span></div>
                  <div style={{display:"flex",gap:6,marginTop:7,flexWrap:"wrap"}}><Tag>{fmtDate(e.date)}</Tag>{!paid?<Tag color={COLORS.red}>⏳ Unpaid</Tag>:<Tag color={paidByColor(e.paidBy,groups,members)}>paid by {paidByLabel(e.paidBy,groups)}</Tag>}<Tag color={COLORS.yellow}>{cl(e.category).replace(/^[^ ]+ /,"")}</Tag>{participants.length<members.length&&<Tag color={COLORS.orange}>{participants.length} people</Tag>}{isCustom&&<Tag color={COLORS.orange}>custom split</Tag>}{(()=>{const grp=groups.find(g=>g.id===e.paidBy);if(grp)return<Tag color={grp.color}>👨‍👩‍👧 {grp.name}</Tag>;const g=memberGroup(groups,e.paidBy);return Boolean(g)?<Tag color={g.color}>👨‍👩‍👧 {g.name}</Tag>:null;})()}</div>
                  {!paid&&<div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap"}}>{[...groups.map(g=>({id:g.id,label:`👨‍👩‍👧 ${g.name}`,color:g.color})),...members.map((m,i)=>({id:m,label:m,color:MEMBER_COLORS[i%MEMBER_COLORS.length]}))].map(opt=><button key={opt.id} onClick={()=>onMarkPaid(e.id,opt.id)} style={{padding:"4px 12px",borderRadius:99,background:opt.color+"22",border:`1px solid ${opt.color}55`,color:opt.color,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓ {opt.label} paid</button>)}</div>}
                  <ShareBar shares={shares} members={members} groups={groups}/>

              </div>
            </Card>);
