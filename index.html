        {tab==="recurring"&&<>
          {recurringExpenses.length===0?<div style={{textAlign:"center",color:COLORS.muted,padding:40}}>No recurring expenses yet.</div>:recurringExpenses.map(r=>{const shares=r.shares||{};return(<Card key={r.id}><div style={{display:"flex",gap:14,alignItems:"flex-start"}}><div style={{fontSize:26,marginTop:2}}>{cl(r.category).split(" ")[0]}</div><div style={{flex:1,minWidth:0}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><span style={{fontWeight:700,color:COLORS.text,fontSize:15}}>{r.description}</span><span style={{fontWeight:800,color:COLORS.teal,fontFamily:"'DM Mono',monospace",fontSize:16}}>{fmt(r.amount)}</span></div><div style={{display:"flex",gap:6,marginTop:7,flexWrap:"wrap"}}><Tag color={COLORS.teal}>🔁 {freqLabel(r.frequency)}</Tag><Tag color={paidByColor(r.paidBy,groups,members)}>paid by {paidByLabel(r.paidBy,groups)}</Tag><Tag color={COLORS.yellow}>{cl(r.category).replace(/^[^ ]+ /,"")}</Tag><Tag color={COLORS.muted}>{fmt(r.amount*freqPerMonth(r.frequency))}/mo</Tag></div><ShareBar shares={shares} members={members} groups={groups}/></div><button onClick={()=>setEditing({expense:r,isRecurring:true})} style={{background:"none",border:`1px solid ${COLORS.border}`,borderRadius:8,padding:"5px 10px",color:COLORS.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit",flexShrink:0,marginTop:2}}>✏️</button></div></Card>);})}
          {recurringExpenses.length>0&&<Card style={{background:COLORS.surface}}><span style={{fontSize:13,color:COLORS.muted}}>Total monthly: </span><span style={{color:COLORS.teal,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{fmt(recurringExpenses.reduce((s,r)=>s+r.amount*freqPerMonth(r.frequency),0))}/month</span></Card>}
        </>}
      </div>);
    }

    // ─── Payments View ────────────────────────────────────────────────────────
    function PaymentsView({payments,members,groups,onAdd,onDelete,onEdit}){
      const entities=getEntities(members,groups);
      const firstId=entities[0]?.id??members[0];
      const secondId=entities.length>1?(entities[1]?.id??members[1]??members[0]):members[0];
      const [from,setFrom]=useState(firstId);
      const [to,setTo]=useState(secondId!==firstId?secondId:(entities[2]?.id??members[1]??members[0]));
      const [amount,setAmount]=useState("");const [date,setDate]=useState(today.toISOString().slice(0,10));const [note,setNote]=useState("");const [success,setSuccess]=useState(false);
      const [editId,setEditId]=useState(null);const [eFrom,setEFrom]=useState("");const [eTo,setETo]=useState("");const [eAmount,setEAmount]=useState("");const [eDate,setEDate]=useState("");const [eNote,setENote]=useState("");
      const startEdit=p=>{setEditId(p.id);setEFrom(p.from);setETo(p.to);setEAmount(String(p.amount));setEDate(p.date);setENote(p.note||"");};
      const cancelEdit=()=>setEditId(null);
      const saveEdit=()=>{if(!parseFloat(eAmount)||eFrom===eTo)return;onEdit({...payments.find(p=>p.id===editId),from:eFrom,to:eTo,amount:parseFloat(eAmount),date:eDate,note:eNote.trim()});setEditId(null);};
      const formValid=parseFloat(amount)>0&&from!==to;
      const submit=()=>{if(!formValid)return;onAdd({id:Date.now().toString(),from,to,amount:parseFloat(amount),date,note:note.trim(),createdAt:new Date().toISOString()});setAmount("");setNote("");setSuccess(true);setTimeout(()=>setSuccess(false),2000);};
      const sorted=[...payments].sort((a,b)=>new Date(b.date)-new Date(a.date));
      const totalPaid=payments.reduce((s,p)=>s+p.amount,0);
      const otherThan=id=>entities.find(e=>e.id!==id)?.id??members[0];
      const ss={background:COLORS.surface,border:`1px solid ${COLORS.border}`,borderRadius:8,padding:"9px 13px",color:COLORS.text,fontSize:14,outline:"none",fontFamily:"inherit",cursor:"pointer",width:"100%",boxSizing:"border-box"};
      const eopts=<>{groups.length>0&&<optgroup label="Family Groups">{groups.map(g=><option key={g.id} value={g.id}>👨‍👩‍👧 {g.name}</option>)}</optgroup>}<optgroup label="Individuals">{members.map(m=><option key={m} value={m}>{m}</option>)}</optgroup></>;
      return(<div style={{maxWidth:600,margin:"0 auto",display:"flex",flexDirection:"column",gap:20}}>
        <Card>
          <h3 style={{margin:"0 0 6px",fontSize:16,fontWeight:800,color:COLORS.text}}>💸 Record a Cash Payment</h3>
          <p style={{margin:"0 0 16px",fontSize:13,color:COLORS.muted}}>Log money transferred between people or groups — cash, Venmo, bank transfer, etc. Balances update automatically.</p>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 28px 1fr",gap:8,alignItems:"end"}}>
              <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={{fontSize:12,color:COLORS.muted,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}}>From (payer)</label><select value={from} onChange={e=>{const v=e.target.value;setFrom(v);if(v===to)setTo(otherThan(v));}} style={ss}>{eopts}</select></div>
              <div style={{paddingBottom:10,color:COLORS.muted,fontSize:18,textAlign:"center"}}>→</div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={{fontSize:12,color:COLORS.muted,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}}>To (recipient)</label><select value={to} onChange={e=>{const v=e.target.value;setTo(v);if(v===from)setFrom(otherThan(v));}} style={ss}>{eopts}</select></div>
            </div>
            {from===to&&<div style={{fontSize:12,color:COLORS.red,padding:"7px 12px",background:COLORS.red+"11",borderRadius:8}}>From and To must be different.</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><Input label="Amount ($)" type="number" placeholder="0.00" value={amount} onChange={e=>setAmount(e.target.value)}/><Input label="Date" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
            <Input label="Note (optional)" placeholder='e.g. "Rent — March"' value={note} onChange={e=>setNote(e.target.value)}/>
            {parseFloat(amount)>0&&from!==to&&<div style={{padding:"11px 14px",background:COLORS.green+"11",borderRadius:10,border:`1px solid ${COLORS.green}33`,fontSize:13}}>
              <span style={{color:entityIdColor(from,groups,members),fontWeight:700}}>{entityDisplayLabel(from,groups)}</span>
              <span style={{color:COLORS.muted}}> pays </span>
              <span style={{color:COLORS.green,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(parseFloat(amount))}</span>
              <span style={{color:COLORS.muted}}> to </span>
              <span style={{color:entityIdColor(to,groups,members),fontWeight:700}}>{entityDisplayLabel(to,groups)}</span>
              {Boolean(groups.find(g=>g.id===from))&&<div style={{fontSize:11,color:COLORS.muted,marginTop:4}}>Shared by: {groups.find(g=>g.id===from).members.join(", ")} ({fmt(parseFloat(amount)/groups.find(g=>g.id===from).members.length)}/person)</div>}
              {Boolean(groups.find(g=>g.id===to))&&<div style={{fontSize:11,color:COLORS.muted,marginTop:2}}>Credited to: {groups.find(g=>g.id===to).members.join(", ")} ({fmt(parseFloat(amount)/groups.find(g=>g.id===to).members.length)}/person)</div>}
            </div>}
            <button onClick={submit} disabled={!formValid} style={{background:success?COLORS.accent:formValid?COLORS.green:COLORS.accentDim,border:"none",borderRadius:10,padding:"13px",color:success?"#fff":formValid?"#000":COLORS.muted,fontWeight:700,fontSize:15,cursor:formValid?"pointer":"default",fontFamily:"inherit",transition:"background 0.25s"}}>{success?"✓ Payment Recorded!":"Record Payment"}</button>
          </div>
        </Card>
        {payments.length>0&&<div style={{display:"flex",gap:12,flexWrap:"wrap"}}><StatBox label="Total Payments" value={fmt(totalPaid)} sub={`${payments.length} transactions`} color={COLORS.green} accent={COLORS.green}/>{entities.map(en=>{const sent=payments.filter(p=>p.from===en.id).reduce((s,p)=>s+p.amount,0);const received=payments.filter(p=>p.to===en.id).reduce((s,p)=>s+p.amount,0);if(!sent&&!received)return null;return(<Card key={en.id} style={{flex:1,minWidth:110,borderLeft:`3px solid ${en.color}`}}><div style={{fontSize:11,color:en.color,fontWeight:700,marginBottom:6}}>{en.label}</div>{sent>0&&<div style={{fontSize:12,color:COLORS.red,fontFamily:"'DM Mono',monospace"}}>sent {fmt(sent)}</div>}{received>0&&<div style={{fontSize:12,color:COLORS.green,fontFamily:"'DM Mono',monospace"}}>rcvd {fmt(received)}</div>}</Card>);})}</div>}
        <Card>
          <h3 style={{margin:"0 0 14px",fontSize:15,fontWeight:800,color:COLORS.text}}>Payment History {payments.length>0&&<span style={{color:COLORS.muted,fontWeight:400,fontSize:13}}>({payments.length})</span>}</h3>
          {sorted.length===0?<div style={{textAlign:"center",color:COLORS.muted,padding:"24px 0",fontSize:13}}>No payments yet.</div>:sorted.map(p=>{
            const fc=entityIdColor(p.from,groups,members);const tc=entityIdColor(p.to,groups,members);
            if(editId===p.id){const ev=parseFloat(eAmount)>0&&eFrom!==eTo;return(<div key={p.id} style={{background:COLORS.surface,borderRadius:12,padding:14,marginBottom:10,border:`1px solid ${COLORS.accent}55`}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 24px 1fr",gap:8,alignItems:"end",marginBottom:10}}>
                <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={{fontSize:11,color:COLORS.muted,fontWeight:600,textTransform:"uppercase"}}>From</label><select value={eFrom} onChange={e=>{const v=e.target.value;setEFrom(v);if(v===eTo)setETo(otherThan(v));}} style={ss}>{eopts}</select></div>
                <div style={{paddingBottom:10,color:COLORS.muted,fontSize:16,textAlign:"center"}}>→</div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={{fontSize:11,color:COLORS.muted,fontWeight:600,textTransform:"uppercase"}}>To</label><select value={eTo} onChange={e=>{const v=e.target.value;setETo(v);if(v===eFrom)setEFrom(otherThan(v));}} style={ss}>{eopts}</select></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}><Input label="Amount ($)" type="number" value={eAmount} onChange={e=>setEAmount(e.target.value)}/><Input label="Date" type="date" value={eDate} onChange={e=>setEDate(e.target.value)}/></div>
              <Input label="Note" placeholder="Optional" value={eNote} onChange={e=>setENote(e.target.value)}/>
              <div style={{display:"flex",gap:8,marginTop:12}}><button onClick={saveEdit} disabled={!ev} style={{flex:1,background:ev?COLORS.accent:COLORS.accentDim,border:"none",borderRadius:8,padding:"10px",color:"#fff",fontWeight:700,fontSize:14,cursor:ev?"pointer":"default",fontFamily:"inherit"}}>Save Changes</button><button onClick={()=>{if(window.confirm("Delete this payment?")){onDelete(p.id);setEditId(null);}}} style={{background:"none",border:`1px solid ${COLORS.red}44`,borderRadius:8,padding:"10px 14px",color:COLORS.red,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>🗑 Delete</button><button onClick={cancelEdit} style={{background:"none",border:`1px solid ${COLORS.border}`,borderRadius:8,padding:"10px 14px",color:COLORS.muted,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button></div>
            </div>);}
            return(<div key={p.id} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 14px",background:COLORS.surface,borderRadius:12,marginBottom:8}}>
              <div style={{width:36,height:36,borderRadius:10,background:COLORS.green+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>💸</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}}><span style={{color:fc,fontWeight:700,fontSize:14}}>{entityDisplayLabel(p.from,groups)}</span><span style={{color:COLORS.muted,fontSize:13}}>→</span><span style={{color:tc,fontWeight:700,fontSize:14}}>{entityDisplayLabel(p.to,groups)}</span></div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}><Tag color={COLORS.muted}>{fmtDate(p.date)}</Tag>{p.note&&<span style={{fontSize:12,color:COLORS.muted,fontStyle:"italic"}}>{p.note}</span>}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}><span style={{fontWeight:800,color:COLORS.green,fontFamily:"'DM Mono',monospace",fontSize:16}}>{fmt(p.amount)}</span><button onClick={()=>startEdit(p)} style={{background:"none",border:`1px solid ${COLORS.border}`,borderRadius:7,padding:"4px 9px",color:COLORS.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✏️</button></div>
            </div>);
          })}
        </Card>
      </div>);
    }

    // ─── Balance View ─────────────────────────────────────────────────────────
    function BalanceView({expenses,payments,members,groups}){
      const entities=getEntities(members,groups);
      const paidExpenses=expenses.filter(isPaid);const unpaidExpenses=expenses.filter(e=>!isPaid(e));
      const balances={};members.forEach(m=>{balances[m]=0;});
      paidExpenses.forEach(e=>{const shares=e.shares||{};const payers=resolvePayers(e.paidBy,e.amount,groups);Object.entries(payers).forEach(([payer,payerAmt])=>{const frac=payerAmt/e.amount;Object.entries(shares).forEach(([person,owed])=>{if(person===payer)return;const credit=owed*frac;balances[payer]=(balances[payer]||0)+credit;balances[person]=(balances[person]||0)-credit;});});});
      payments.forEach(p=>{const fm=resolveEntityMembers(p.from,groups);const tm=resolveEntityMembers(p.to,groups);const fs=p.amount/fm.length;const ts=p.amount/tm.length;fm.forEach(m=>{balances[m]=(balances[m]||0)+fs;});tm.forEach(m=>{balances[m]=(balances[m]||0)-ts;});});
      const entityBalances={};entities.forEach(en=>{entityBalances[en.id]=en.members.reduce((s,m)=>s+(balances[m]||0),0);});
      const cr=members.map(m=>({name:m,bal:balances[m]})).filter(b=>b.bal>0.01).sort((a,b)=>b.bal-a.bal).map(b=>({...b}));
      const dr=members.map(m=>({name:m,bal:balances[m]})).filter(b=>b.bal<-0.01).sort((a,b)=>a.bal-b.bal).map(b=>({...b}));
      const settlements=[];let ci=0,di=0;
      while(ci<cr.length&&di<dr.length){const amt=Math.min(cr[ci].bal,-dr[di].bal);if(amt>0.01)settlements.push({from:dr[di].name,to:cr[ci].name,amount:amt});cr[ci].bal-=amt;dr[di].bal+=amt;if(cr[ci].bal<0.01)ci++;if(dr[di].bal>-0.01)di++;}
      const total=paidExpenses.reduce((s,e)=>s+e.amount,0);const unpaidTotal=unpaidExpenses.reduce((s,e)=>s+e.amount,0);
      const owedByMember={};members.forEach(m=>{owedByMember[m]=0;});paidExpenses.forEach(e=>{const shares=e.shares||{};Object.entries(shares).forEach(([p,amt])=>{owedByMember[p]=(owedByMember[p]||0)+amt;});});
      const owedByEntity={};entities.forEach(en=>{owedByEntity[en.id]=en.members.reduce((s,m)=>s+(owedByMember[m]||0),0);});
      const unpaidByEntity={};entities.forEach(en=>{unpaidByEntity[en.id]=unpaidExpenses.reduce((s,e)=>{const shares=e.shares||{};return s+en.members.reduce((ss,m)=>ss+(shares[m]||0),0);},0);});
      return(<div style={{maxWidth:680,margin:"0 auto",display:"flex",flexDirection:"column",gap:18}}>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          <StatBox label="Paid Expenses" value={fmt(total)} sub={`${paidExpenses.length} transactions`} color={COLORS.green} accent={COLORS.green}/>
          <StatBox label="Outstanding (Unpaid)" value={fmt(unpaidTotal)} sub={`${unpaidExpenses.length} expenses`} color={unpaidTotal>0?COLORS.red:COLORS.muted} accent={unpaidTotal>0?COLORS.red:undefined}/>
          <StatBox label="Cash Payments" value={fmt(payments.reduce((s,p)=>s+p.amount,0))} sub={`${payments.length} recorded`} color={COLORS.teal} accent={payments.length>0?COLORS.teal:undefined}/>
        </div>
        {unpaidExpenses.length>0&&<Card style={{borderLeft:`3px solid ${COLORS.red}`}}>
          <h3 style={{margin:"0 0 12px",fontSize:15,fontWeight:800,color:COLORS.text}}>⏳ Outstanding Unpaid — by Entity</h3>
          <p style={{margin:"0 0 14px",fontSize:12,color:COLORS.muted}}>Each entity's share of expenses not yet paid.</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>{entities.filter(en=>unpaidByEntity[en.id]>0).map(en=><div key={en.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:COLORS.surface,borderRadius:10,border:`1px solid ${en.color}22`}}><div><span style={{fontWeight:700,color:en.color}}>{en.label}</span>{en.type==="group"&&<div style={{fontSize:11,color:COLORS.muted,marginTop:2}}>{en.members.join(" · ")}</div>}</div><span style={{fontWeight:800,color:COLORS.red,fontFamily:"'DM Mono',monospace",fontSize:16}}>{fmt(unpaidByEntity[en.id])}</span></div>)}</div>
        </Card>}
        <Card><h3 style={{margin:"0 0 14px",fontSize:15,fontWeight:800,color:COLORS.text}}>Total Share by Entity</h3><div style={{display:"flex",flexDirection:"column",gap:10}}>{entities.map(en=>{const amt=owedByEntity[en.id]||0;const pct=(amt/(total||1))*100;return(<div key={en.id}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:en.color,fontWeight:700}}>{en.label}{en.type==="group"?` (${en.members.join(", ")})`:""}</span><span style={{fontSize:13,fontFamily:"'DM Mono',monospace",color:COLORS.muted}}>{fmt(amt)} <span style={{fontSize:11}}>({pct.toFixed(0)}%)</span></span></div><div style={{height:6,background:COLORS.border,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:en.color,borderRadius:99}}/></div></div>);})}</div></Card>
        <Card><h3 style={{margin:"0 0 8px",fontSize:15,fontWeight:800,color:COLORS.text}}>Net Balance by Entity</h3><p style={{margin:"0 0 14px",fontSize:12,color:COLORS.muted}}>Positive = others owe them. Negative = they owe others.</p><div style={{display:"flex",flexDirection:"column",gap:8}}>{entities.map(en=>{const bal=entityBalances[en.id]||0;const color=bal>0.01?COLORS.green:bal<-0.01?COLORS.red:COLORS.muted;return(<div key={en.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:COLORS.surface,borderRadius:10,border:`1px solid ${en.color}22`}}><div><span style={{fontWeight:700,color:en.color}}>{en.label}</span>{en.type==="group"&&<div style={{fontSize:11,color:COLORS.muted,marginTop:2}}>{en.members.join(" · ")}</div>}</div><span style={{fontWeight:800,color,fontFamily:"'DM Mono',monospace",fontSize:18}}>{bal>0.01?"+":""}{fmt(bal)}</span></div>);})}</div></Card>
        {groups.length>0&&<Card><h3 style={{margin:"0 0 14px",fontSize:15,fontWeight:800,color:COLORS.text}}>Individual Net Balances</h3><div style={{display:"flex",flexDirection:"column",gap:8}}>{members.map((m,i)=>{const bal=balances[m]||0;const color=bal>0.01?COLORS.green:bal<-0.01?COLORS.red:COLORS.muted;const g=memberGroup(groups,m);const mc=MEMBER_COLORS[i%MEMBER_COLORS.length];return(<div key={m} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",background:COLORS.surface,borderRadius:10}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontWeight:700,color:mc}}>{m}</span>{Boolean(g)&&<span style={{fontSize:11,padding:"1px 8px",borderRadius:99,background:g.color+"22",color:g.color,fontWeight:700}}>👨‍👩‍👧 {g.name}</span>}</div><span style={{fontWeight:700,color,fontFamily:"'DM Mono',monospace"}}>{bal>0.01?"+":""}{fmt(bal)}</span></div>);})}</div></Card>}
        <Card><h3 style={{margin:"0 0 14px",fontSize:15,fontWeight:800,color:COLORS.text}}>Settlements Needed</h3>
          {settlements.length===0?<div style={{color:COLORS.green,fontWeight:700}}>✓ All settled up!</div>:settlements.map((s,i)=>{const fi=members.indexOf(s.from),ti=members.indexOf(s.to);const fg=memberGroup(groups,s.from),tg=memberGroup(groups,s.to);return(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:COLORS.surface,borderRadius:10,marginBottom:8}}><div style={{fontSize:14,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}><span style={{color:MEMBER_COLORS[fi%MEMBER_COLORS.length],fontWeight:700}}>{s.from}</span>{Boolean(fg)&&<span style={{fontSize:11,color:fg.color}}>(👨‍👩‍👧 {fg.name})</span>}<span style={{color:COLORS.muted}}>→</span><span style={{color:MEMBER_COLORS[ti%MEMBER_COLORS.length],fontWeight:700}}>{s.to}</span>{Boolean(tg)&&<span style={{fontSize:11,color:tg.color}}>(👨‍👩‍👧 {tg.name})</span>}</div><span style={{fontWeight:800,color:COLORS.yellow,fontFamily:"'DM Mono',monospace"}}>{fmt(s.amount)}</span></div>);})}
        </Card>
      </div>);
    }

    // ─── Reports View ─────────────────────────────────────────────────────────
    function ReportsView({expenses,recurringExpenses,payments,members,groups,allCategories}){
      const entities=getEntities(members,groups);
      const [view,setView]=useState(entities[0]?.id??"");const [period,setPeriod]=useState("all");
      const now=new Date();
      const fbp=e=>{if(period==="unpaid")return!isPaid(e);if(period==="all")return true;const d=new Date(e.date||e.startDate);if(period==="thismonth")return e.date?.slice(0,7)===thisMonth;if(period==="last3"){const age=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());return age>=0&&age<3;}if(period==="last6"){const age=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());return age>=0&&age<6;}if(period==="thisyear")return d.getFullYear()===now.getFullYear();return true;};
      const fpp=p=>{if(period==="unpaid")return false;if(period==="all")return true;const d=new Date(p.date);if(period==="thismonth")return p.date?.slice(0,7)===thisMonth;if(period==="last3"){const age=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());return age>=0&&age<3;}if(period==="last6"){const age=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());return age>=0&&age<6;}if(period==="thisyear")return d.getFullYear()===now.getFullYear();return true;};
      const entity=entities.find(en=>en.id===view);
      if(!entity)return<div style={{textAlign:"center",color:COLORS.muted,padding:60}}>No members to report on.</div>;
      const entityExpenses=expenses.filter(fbp).filter(e=>{const payers=resolvePayers(e.paidBy,e.amount,groups);return entity.members.some(m=>e.participants?.includes(m)||payers[m]!==undefined);});
      const entityExpensesPaid=entityExpenses.filter(isPaid);const entityExpensesUnpaid=entityExpenses.filter(e=>!isPaid(e));
      const entityOwed=entityExpenses.reduce((s,e)=>{const shares=e.shares||{};return s+entity.members.reduce((ss,m)=>ss+(shares[m]||0),0);},0);
      const entityOutstanding=entityExpensesUnpaid.reduce((s,e)=>{const shares=e.shares||{};return s+entity.members.reduce((ss,m)=>ss+(shares[m]||0),0);},0);
      const entityPaid=entityExpensesPaid.reduce((s,e)=>{const payers=resolvePayers(e.paidBy,e.amount,groups);return s+entity.members.reduce((ss,m)=>ss+(payers[m]||0),0);},0);
      const pmn={};members.forEach(m=>{pmn[m]=0;});
      expenses.filter(fbp).filter(isPaid).forEach(e=>{const shares=e.shares||{};const payers=resolvePayers(e.paidBy,e.amount,groups);Object.entries(payers).forEach(([payer,payerAmt])=>{const frac=payerAmt/e.amount;Object.entries(shares).forEach(([person,owed])=>{if(person===payer)return;const credit=owed*frac;pmn[payer]=(pmn[payer]||0)+credit;pmn[person]=(pmn[person]||0)-credit;});});});
      const pp=payments.filter(fpp);
      pp.forEach(p=>{const fm=resolveEntityMembers(p.from,groups);const tm=resolveEntityMembers(p.to,groups);const fs=p.amount/fm.length;const ts=p.amount/tm.length;fm.forEach(m=>{pmn[m]=(pmn[m]||0)+fs;});tm.forEach(m=>{pmn[m]=(pmn[m]||0)-ts;});});
      const entityNetBalance=entity.members.reduce((s,m)=>s+(pmn[m]||0),0);
      const eps=pp.filter(p=>resolveEntityMembers(p.from,groups).some(m=>entity.members.includes(m)));
      const epr=pp.filter(p=>resolveEntityMembers(p.to,groups).some(m=>entity.members.includes(m)));
      const ts2=eps.reduce((s,p)=>{const fm=resolveEntityMembers(p.from,groups);const my=entity.members.filter(m=>fm.includes(m)).length;return s+(p.amount/fm.length)*my;},0);
      const tr2=epr.reduce((s,p)=>{const tm=resolveEntityMembers(p.to,groups);const my=entity.members.filter(m=>tm.includes(m)).length;return s+(p.amount/tm.length)*my;},0);
      const byCat={};entityExpenses.forEach(e=>{const share=entity.members.reduce((s,m)=>s+((e.shares||{})[m]||0),0);byCat[e.category]=(byCat[e.category]||0)+share;});
      const catEntries=Object.entries(byCat).filter(([,v])=>v>0).sort(([,a],[,b])=>b-a);const catTotal=catEntries.reduce((s,[,v])=>s+v,0);
      const byMonth={};entityExpenses.forEach(e=>{const k=e.date?.slice(0,7);if(!k)return;const share=entity.members.reduce((s,m)=>s+((e.shares||{})[m]||0),0);byMonth[k]=(byMonth[k]||0)+share;});
      const months=Object.entries(byMonth).sort(([a],[b])=>a.localeCompare(b)).slice(-6);const maxM=Math.max(...months.map(([,v])=>v),1);
      const er=recurringExpenses.filter(r=>entity.members.some(m=>r.participants?.includes(m)||r.paidBy===m));
      const rt=er.reduce((s,r)=>{const share=entity.members.reduce((ss,m)=>ss+((r.shares||{})[m]||0),0);return s+share*freqPerMonth(r.frequency);},0);
      const colorBar=entity.color;
      return(<div style={{maxWidth:700,margin:"0 auto",display:"flex",flexDirection:"column",gap:18}}>
        <Card>
          <div style={{fontSize:11,color:COLORS.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>View Report For</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{entities.map(en=><button key={en.id} onClick={()=>setView(en.id)} style={{padding:"7px 16px",borderRadius:99,background:view===en.id?en.color+"33":COLORS.surface,color:view===en.id?en.color:COLORS.muted,border:`1px solid ${view===en.id?en.color:COLORS.border}`,cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>{en.label}</button>)}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:12}}>{[["all","All Time"],["unpaid","⏳ Unpaid"],["thismonth","This Month"],["last3","Last 3 Mo"],["last6","Last 6 Mo"],["thisyear","This Year"]].map(([val,lbl])=><Pill key={val} small active={period===val} onClick={()=>setPeriod(val)} color={val==="unpaid"?COLORS.red:colorBar}>{lbl}</Pill>)}</div>
        </Card>
        <div style={{padding:"16px 20px",background:colorBar+"18",border:`1px solid ${colorBar}44`,borderRadius:14,display:"flex",alignItems:"center",gap:14}}><div style={{width:44,height:44,borderRadius:12,background:colorBar+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{entity.type==="group"?"👨‍👩‍👧":"👤"}</div><div><div style={{fontSize:18,fontWeight:900,color:colorBar}}>{entity.label}</div>{entity.type==="group"&&<div style={{fontSize:12,color:COLORS.muted,marginTop:2}}>{entity.members.join(" · ")}</div>}</div></div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}><StatBox label="Total Share" value={fmt(entityOwed)} sub={`${entityExpenses.length} expenses`} color={COLORS.accentLight} accent={colorBar}/><StatBox label="Paid Out-of-Pocket" value={fmt(entityPaid)} sub={`${entityExpensesPaid.length} paid`} color={COLORS.text}/>{entityOutstanding>0&&<StatBox label="Outstanding" value={fmt(entityOutstanding)} sub={`${entityExpensesUnpaid.length} unpaid`} color={COLORS.red} accent={COLORS.red}/>}<StatBox label="Net Balance" value={fmt(entityNetBalance)} sub={entityNetBalance>=0?"owed back":"owes others"} color={entityNetBalance>=0?COLORS.green:COLORS.red} accent={entityNetBalance>=0?COLORS.green:COLORS.red}/></div>
        {(ts2>0||tr2>0)&&<Card style={{borderLeft:`3px solid ${COLORS.teal}`}}><h3 style={{margin:"0 0 12px",fontSize:15,fontWeight:800,color:COLORS.text}}>💸 Cash Payments</h3><div style={{display:"flex",gap:12,flexWrap:"wrap"}}>{ts2>0&&<div style={{flex:1,background:COLORS.surface,borderRadius:10,padding:"10px 14px",textAlign:"center"}}><div style={{fontSize:11,color:COLORS.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Sent</div><div style={{fontSize:20,fontWeight:800,color:COLORS.red,fontFamily:"'DM Mono',monospace"}}>{fmt(ts2)}</div></div>}{tr2>0&&<div style={{flex:1,background:COLORS.surface,borderRadius:10,padding:"10px 14px",textAlign:"center"}}><div style={{fontSize:11,color:COLORS.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Received</div><div style={{fontSize:20,fontWeight:800,color:COLORS.green,fontFamily:"'DM Mono',monospace"}}>{fmt(tr2)}</div></div>}</div></Card>}
        {rt>0&&<Card style={{borderLeft:`3px solid ${COLORS.teal}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:11,color:COLORS.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Monthly Recurring Commitment</div><div style={{fontSize:22,fontWeight:800,color:COLORS.teal,fontFamily:"'DM Mono',monospace"}}>{fmt(rt)}/mo</div></div></div></Card>}
        {catEntries.length>0&&<Card><h3 style={{margin:"0 0 14px",fontSize:15,fontWeight:800,color:COLORS.text}}>Spending by Category</h3><div style={{display:"flex",flexDirection:"column",gap:10}}>{catEntries.map(([cat,amt])=>{const pct=(amt/(catTotal||1))*100;return(<div key={cat}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:COLORS.text}}>{catLabel(cat,allCategories)}</span><span style={{fontSize:13,color:COLORS.muted,fontFamily:"'DM Mono',monospace"}}>{fmt(amt)}</span></div><div style={{height:6,background:COLORS.border,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:colorBar,borderRadius:99}}/></div></div>);})}</div></Card>}
        {months.length>0&&<Card><h3 style={{margin:"0 0 14px",fontSize:15,fontWeight:800,color:COLORS.text}}>Monthly Trend</h3><div style={{display:"flex",alignItems:"flex-end",gap:8,height:110}}>{months.map(([month,amt])=><div key={month} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}><div style={{fontSize:10,color:COLORS.muted,fontFamily:"'DM Mono',monospace"}}>{fmt(amt)}</div><div style={{width:"100%",background:colorBar+"99",borderRadius:"4px 4px 0 0",height:`${(amt/maxM)*80}px`,minHeight:4}}/><div style={{fontSize:10,color:COLORS.muted}}>{month.slice(5)}/{month.slice(2,4)}</div></div>)}</div></Card>}
        {entityExpenses.length===0&&<div style={{textAlign:"center",color:COLORS.muted,padding:30}}>No expenses for this entity in the selected period.</div>}
      </div>);
    }

    // ─── Budget View ──────────────────────────────────────────────────────────
    function BudgetView({expenses,recurringExpenses,members,groups,allCategories}){
      const [horizon,setHorizon]=useState(3);const [overrides,setOverrides]=useState({});const [editing,setEditing]=useState(null);const [editVal,setEditVal]=useState("");
      const entities=getEntities(members,groups);
      const histMonths=new Set();const histByCat={};allCategories.forEach(c=>{histByCat[c.value]=0;});
      expenses.forEach(e=>{const m=e.date?.slice(0,7);if(!m||m>=thisMonth)return;const age=(today.getFullYear()-parseInt(m.slice(0,4)))*12+(today.getMonth()-(parseInt(m.slice(5))-1));if(age>=1&&age<=6){histMonths.add(m);histByCat[e.category]=(histByCat[e.category]||0)+e.amount;}});
      const mwd=Math.max(histMonths.size,1);const avgByCat={};allCategories.forEach(c=>{avgByCat[c.value]=(histByCat[c.value]||0)/mwd;});
      const budgetByCat={};allCategories.forEach(c=>{budgetByCat[c.value]=overrides[c.value]!==undefined?parseFloat(overrides[c.value])||0:avgByCat[c.value];});
      const totalBudget=Object.values(budgetByCat).reduce((s,v)=>s+v,0);const ppb=totalBudget/members.length;
      const recurByCat={};allCategories.forEach(c=>{recurByCat[c.value]=0;});recurringExpenses.forEach(r=>{recurByCat[r.category]=(recurByCat[r.category]||0)+r.amount*freqPerMonth(r.frequency);});const totalRecurring=Object.values(recurByCat).reduce((s,v)=>s+v,0);
      const tmbyCat={};allCategories.forEach(c=>{tmbyCat[c.value]=0;});expenses.filter(e=>e.date?.slice(0,7)===thisMonth).forEach(e=>{tmbyCat[e.category]=(tmbyCat[e.category]||0)+e.amount;});
      const committedByCat={};allCategories.forEach(c=>{committedByCat[c.value]=(tmbyCat[c.value]||0)+(recurByCat[c.value]||0);});const committedTotal=Object.values(committedByCat).reduce((s,v)=>s+v,0);
      const dim=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();const dom=today.getDate();const pctE=dom/dim;const ebn=totalBudget*pctE;const pace=committedTotal/(ebn||1);const projEnd=pctE>0?committedTotal/pctE:totalBudget;
      const forecast=Array.from({length:horizon},(_,i)=>{const d=new Date(today.getFullYear(),today.getMonth()+i+1,1);return{label:d.toLocaleDateString("en-US",{month:"short",year:"2-digit"}),amount:totalBudget};});
      const catEntries=allCategories.map(c=>({cat:c.value,label:c.label,budget:budgetByCat[c.value]||0,avg:avgByCat[c.value]||0,spent:committedByCat[c.value]||0,isOverride:overrides[c.value]!==undefined})).filter(e=>e.budget>0||e.spent>0).sort((a,b)=>b.budget-a.budget);
      const months6=Array.from(histMonths).sort().slice(-6);
      const saveOverride=cat=>{const v=parseFloat(editVal);if(!isNaN(v)&&v>=0)setOverrides(o=>({...o,[cat]:v}));else setOverrides(o=>{const n={...o};delete n[cat];return n;});setEditing(null);};
      return(<div style={{maxWidth:720,margin:"0 auto",display:"flex",flexDirection:"column",gap:18}}>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}><StatBox label="Monthly Budget" value={fmt(totalBudget)} sub={Object.keys(overrides).length>0?`${Object.keys(overrides).length} custom override${Object.keys(overrides).length>1?"s":""}`:`avg of ${mwd} mo.`} color={COLORS.accentLight} accent={COLORS.accent}/><StatBox label="Fixed Recurring" value={fmt(totalRecurring)} sub={`${recurringExpenses.length} items`} color={COLORS.teal} accent={COLORS.teal}/><StatBox label="Per Person / Mo" value={fmt(ppb)} sub={`${members.length} people`} color={COLORS.yellow} accent={COLORS.yellow}/></div>
        <Card style={{borderLeft:`3px solid ${pace>1.15?COLORS.red:pace>0.95?COLORS.yellow:COLORS.green}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}><h3 style={{margin:0,fontSize:15,fontWeight:800,color:COLORS.text}}>This Month's Pace<span style={{color:COLORS.muted,fontWeight:400,fontSize:13}}> · Day {dom} of {dim}</span></h3><Tag color={pace>1.15?COLORS.red:pace>0.95?COLORS.yellow:COLORS.green}>{pace>1.15?"⚠ Over budget":pace<0.75?"✓ Under budget":"On track"}</Tag></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>{[{label:"Spent this month",val:committedTotal,color:COLORS.text},{label:`Budget by day ${dom}`,val:ebn,color:COLORS.muted},{label:"Projected month-end",val:projEnd,color:projEnd>totalBudget*1.1?COLORS.red:COLORS.green}].map(({label,val,color})=><div key={label} style={{background:COLORS.surface,borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:10,color:COLORS.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.04em"}}>{label}</div><div style={{fontSize:17,fontWeight:800,color,fontFamily:"'DM Mono',monospace"}}>{fmt(val)}</div></div>)}</div>
          <div style={{height:10,background:COLORS.border,borderRadius:99,overflow:"hidden",position:"relative"}}><div style={{position:"absolute",left:`${Math.min((ebn/(totalBudget*1.1||1))*100,95)}%`,top:-2,bottom:-2,width:2,background:COLORS.accent,borderRadius:2,zIndex:2}}/><div style={{height:"100%",width:`${Math.min((committedTotal/(totalBudget*1.1||1))*100,100)}%`,background:pace>1.15?COLORS.red:pace>0.95?COLORS.yellow:COLORS.green,borderRadius:99}}/></div>
        </Card>
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:8}}><h3 style={{margin:0,fontSize:15,fontWeight:800,color:COLORS.text}}>Budget by Category</h3><div style={{fontSize:12,color:COLORS.muted}}>Based on {mwd} month{mwd!==1?"s":""} of history{Object.keys(overrides).length>0&&<span style={{color:COLORS.orange}}> · {Object.keys(overrides).length} overridden</span>}</div></div>
          <div style={{fontSize:12,color:COLORS.muted,marginBottom:16}}>Click any budget amount to set a custom value. Press Enter to save.</div>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {catEntries.map(({cat,label,budget,avg,spent,isOverride})=>{
              const isEdit=editing===cat;const pct=budget>0?Math.min((spent/budget)*100,100):0;const over=budget>0&&spent>budget;const barColor=over?COLORS.red:pct>80?COLORS.yellow:COLORS.accent;
              return(<div key={cat}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5,gap:8,flexWrap:"wrap"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}><span style={{fontSize:13,color:COLORS.text,fontWeight:600}}>{label}</span>{isOverride&&<Tag color={COLORS.orange}>custom</Tag>}{!isOverride&&mwd>0&&<span style={{fontSize:11,color:COLORS.muted}}>6-mo avg</span>}</div>
                  {isEdit?(<div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                    <div style={{position:"relative"}}><span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:COLORS.muted,fontSize:13}}>$</span><input type="number" min="0" step="1" autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveOverride(cat);if(e.key==="Escape")setEditing(null);}} placeholder={avg.toFixed(0)} style={{background:COLORS.surface,border:`1px solid ${COLORS.accent}`,borderRadius:7,padding:"5px 8px 5px 22px",color:COLORS.text,fontSize:13,outline:"none",width:90,fontFamily:"'DM Mono',monospace"}}/></div>
                    <button onClick={()=>saveOverride(cat)} style={{background:COLORS.accent,border:"none",borderRadius:7,padding:"5px 10px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓</button>
                    {isOverride&&<button onClick={()=>{setOverrides(o=>{const n={...o};delete n[cat];return n;});setEditing(null);}} style={{background:"none",border:`1px solid ${COLORS.border}`,borderRadius:7,padding:"5px 8px",color:COLORS.muted,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>reset</button>}
                    <button onClick={()=>setEditing(null)} style={{background:"none",border:"none",color:COLORS.muted,fontSize:16,cursor:"pointer",lineHeight:1}}>×</button>
                  </div>):(<div style={{display:"flex",gap:10,alignItems:"center",flexShrink:0}}><span style={{fontSize:12,color:over?COLORS.red:COLORS.muted,fontFamily:"'DM Mono',monospace"}}>{fmt(spent)}<span style={{color:COLORS.muted}}> / </span><button onClick={()=>{setEditing(cat);setEditVal(budget.toFixed(0));}} style={{background:"none",border:"none",color:isOverride?COLORS.orange:COLORS.muted,fontFamily:"'DM Mono',monospace",fontSize:12,cursor:"pointer",padding:0,textDecoration:"underline dotted"}}>{fmt(budget)}</button></span>{over&&<span style={{color:COLORS.red,fontWeight:700,fontSize:12}}>▲{fmt(spent-budget)}</span>}</div>)}
                </div>
                <div style={{height:8,background:COLORS.border,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:barColor,borderRadius:99,transition:"width 0.6s"}}/></div>
                {months6.length>1&&<div style={{display:"flex",gap:3,marginTop:5,alignItems:"flex-end",height:20}}>{months6.map(mo=>{const moAmt=expenses.filter(e=>e.date?.slice(0,7)===mo&&e.category===cat).reduce((s,e)=>s+e.amount,0);const maxAmt=Math.max(...months6.map(m2=>expenses.filter(e=>e.date?.slice(0,7)===m2&&e.category===cat).reduce((s,e)=>s+e.amount,0)),budget,1);const h=Math.round((moAmt/maxAmt)*18);return<div key={mo} title={`${mo}: ${fmt(moAmt)}`} style={{flex:1,height:`${Math.max(h,2)}px`,background:COLORS.accent+"44",borderRadius:2}}/>;})}</div>}
              </div>);
            })}
          </div>
        </Card>
        {months6.length>0&&<Card><h3 style={{margin:"0 0 14px",fontSize:15,fontWeight:800,color:COLORS.text}}>6-Month Spending History</h3><div style={{display:"flex",alignItems:"flex-end",gap:8,height:130}}>{months6.map(mo=>{const amt=expenses.filter(e=>e.date?.slice(0,7)===mo).reduce((s,e)=>s+e.amount,0);const maxAmt=Math.max(...months6.map(m2=>expenses.filter(e=>e.date?.slice(0,7)===m2).reduce((s,e)=>s+e.amount,0)),1);const ob=amt>totalBudget;return(<div key={mo} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}><div style={{fontSize:10,color:ob?COLORS.red:COLORS.muted,fontFamily:"'DM Mono',monospace"}}>{fmt(amt)}</div><div style={{width:"100%",background:ob?COLORS.red+"99":COLORS.accent+"88",borderRadius:"4px 4px 0 0",height:`${(amt/maxAmt)*90}px`,minHeight:4}}/><div style={{fontSize:10,color:COLORS.muted}}>{mo.slice(5)}/{mo.slice(2,4)}</div></div>);})}</div>{totalBudget>0&&<div style={{fontSize:12,color:COLORS.muted,marginTop:8,borderTop:`1px solid ${COLORS.border}`,paddingTop:8}}>Budget target: <span style={{color:COLORS.accent,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{fmt(totalBudget)}/mo</span></div>}</Card>}
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}><h3 style={{margin:0,fontSize:15,fontWeight:800,color:COLORS.text}}>Forecast: Next {horizon} Month{horizon>1?"s":""}</h3><div style={{display:"flex",gap:6}}>{[1,3,6,12].map(n=><Pill small key={n} active={horizon===n} onClick={()=>setHorizon(n)}>{n}mo</Pill>)}</div></div>
          <div style={{display:"flex",alignItems:"flex-end",gap:8,height:130}}><div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><div style={{fontSize:10,color:COLORS.accentLight,fontFamily:"'DM Mono',monospace"}}>{fmt(committedTotal)}</div><div style={{width:"100%",background:COLORS.accent,borderRadius:"4px 4px 0 0",height:`${(committedTotal/(totalBudget||1))*100}px`,maxHeight:100,minHeight:4}}/><div style={{fontSize:11,color:COLORS.accentLight,fontWeight:700}}>This mo.</div></div>{forecast.map(({label,amount})=><div key={label} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><div style={{fontSize:10,color:COLORS.muted,fontFamily:"'DM Mono',monospace"}}>{fmt(amount)}</div><div style={{width:"100%",height:"100px",borderRadius:"4px 4px 0 0",border:`1px dashed ${COLORS.accent}55`,background:COLORS.accentDim+"55",boxSizing:"border-box"}}/><div style={{fontSize:11,color:COLORS.muted}}>{label}</div></div>)}</div>
        </Card>
      </div>);
    }

    // ─── Summary View ─────────────────────────────────────────────────────────
    function SummaryView({expenses,members,groups,allCategories}){
      const byCat={};allCategories.forEach(c=>{byCat[c.value]=0;});expenses.forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+e.amount;});
      const catEntries=Object.entries(byCat).filter(([,v])=>v>0).sort(([,a],[,b])=>b-a);const total=expenses.reduce((s,e)=>s+e.amount,0);
      const byMember={};members.forEach(m=>{byMember[m]=0;});expenses.forEach(e=>{const payers=resolvePayers(e.paidBy,e.amount,groups);Object.entries(payers).forEach(([m,v])=>{byMember[m]=(byMember[m]||0)+v;});});
      const byMonth={};expenses.forEach(e=>{const k=e.date?.slice(0,7);if(k)byMonth[k]=(byMonth[k]||0)+e.amount;});
      const months=Object.entries(byMonth).sort(([a],[b])=>a.localeCompare(b)).slice(-6);const maxM=Math.max(...months.map(([,v])=>v),1);const entities=getEntities(members,groups);
      return(<div style={{maxWidth:700,margin:"0 auto",display:"flex",flexDirection:"column",gap:18}}>
        <Card><h3 style={{margin:"0 0 16px",fontSize:15,fontWeight:800,color:COLORS.text}}>Spending by Category</h3><div style={{display:"flex",flexDirection:"column",gap:10}}>{catEntries.map(([cat,amt])=>{const pct=(amt/(total||1))*100;return(<div key={cat}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:COLORS.text}}>{catLabel(cat,allCategories)}</span><span style={{fontSize:13,color:COLORS.muted,fontFamily:"'DM Mono',monospace"}}>{fmt(amt)}</span></div><div style={{height:6,background:COLORS.border,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:COLORS.accent,borderRadius:99}}/></div></div>);})}</div></Card>
        <Card><h3 style={{margin:"0 0 16px",fontSize:15,fontWeight:800,color:COLORS.text}}>Who's Paid Out-of-Pocket</h3><div style={{display:"flex",flexDirection:"column",gap:10}}>{entities.map(en=>{const amt=en.members.reduce((s,m)=>s+(byMember[m]||0),0);const pct=(amt/(total||1))*100;return(<div key={en.id}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:en.color,fontWeight:700}}>{en.label}{en.type==="group"?<span style={{color:COLORS.muted,fontWeight:400}}> ({en.members.join(", ")})</span>:""}</span><span style={{fontSize:13,color:COLORS.muted,fontFamily:"'DM Mono',monospace"}}>{fmt(amt)} ({pct.toFixed(0)}%)</span></div><div style={{height:6,background:COLORS.border,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:en.color,borderRadius:99}}/></div></div>);})}</div></Card>
        {months.length>0&&<Card><h3 style={{margin:"0 0 16px",fontSize:15,fontWeight:800,color:COLORS.text}}>Monthly Spending History</h3><div style={{display:"flex",alignItems:"flex-end",gap:10,height:120}}>{months.map(([month,amt])=><div key={month} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><div style={{fontSize:10,color:COLORS.muted,fontFamily:"'DM Mono',monospace"}}>{fmt(amt)}</div><div style={{width:"100%",background:COLORS.accent+"99",borderRadius:"4px 4px 0 0",height:`${(amt/maxM)*80}px`,minHeight:4}}/><div style={{fontSize:11,color:COLORS.muted}}>{month.slice(5)}/{month.slice(2,4)}</div></div>)}</div></Card>}
      </div>);
    }

    // ─── Main App ─────────────────────────────────────────────────────────────
    const VIEWS=["Add Expense","Expenses","Payments","Balance","Reports","Budget","Summary"];

    function App(){
      const [household,setHousehold,loadingH,syncedH]=useSharedStorage("household-v1",null);
      const [expenses,setExpenses,loadingE]=useSharedStorage("expenses-v1",[]);
      const [recurring,setRecurring,loadingR]=useSharedStorage("recurring-v1",[]);
      const [customCategories,setCustomCategories,loadingC]=useSharedStorage("custom-categories-v1",[]);
      const [groups,setGroups,loadingG]=useSharedStorage("family-groups-v1",[]);
      const [payments,setPayments,loadingP]=useSharedStorage("payments-v1",[]);
      const [currentUser,setCurrentUser]=useState(null);
      const [view,setView]=useState("Add Expense");
      const [showCatMgr,setShowCatMgr]=useState(false);
      const [showFamMgr,setShowFamMgr]=useState(false);
      const allCategories=[...DEFAULT_CATEGORIES,...customCategories];
      useEffect(()=>{if(household&&!currentUser)setCurrentUser(household[0]);},[household]);

      if(loadingH||loadingE||loadingR||loadingC||loadingG||loadingP){
        return(<div style={{background:COLORS.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
          <div style={{fontSize:40}}>🏡</div>
          <div style={{color:COLORS.muted,fontSize:14}}>Connecting to Firebase…</div>
        </div>);
      }

      if(!household){return(<div style={{background:COLORS.bg,minHeight:"100vh",fontFamily:"'DM Sans',sans-serif"}}><SetupView onDone={setHousehold}/></div>);}

      return(<div style={{background:COLORS.bg,minHeight:"100vh",fontFamily:"'DM Sans',sans-serif",color:COLORS.text}}>
        {showCatMgr&&<CategoryManager customCategories={customCategories} onChange={setCustomCategories} onClose={()=>setShowCatMgr(false)}/>}
        {showFamMgr&&<FamilyManager groups={groups} members={household} onChange={setGroups} onClose={()=>setShowFamMgr(false)}/>}
        <div style={{background:COLORS.surface,borderBottom:`1px solid ${COLORS.border}`,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>🏡</span>
            <span style={{fontWeight:900,fontSize:17,letterSpacing:"-0.03em"}}>Split<span style={{color:COLORS.accent}}>Home</span></span>
            <span title="Live sync — all household members share this data" style={{width:8,height:8,borderRadius:99,background:COLORS.green,flexShrink:0,marginLeft:2}}/>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{VIEWS.map(v=><Pill key={v} active={view===v} onClick={()=>setView(v)}>{v==="Budget"?"📊 Budget":v==="Reports"?"📋 Reports":v==="Payments"?"💸 Payments":v}</Pill>)}</div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <button onClick={()=>setShowFamMgr(true)} style={{background:"none",border:`1px solid ${COLORS.border}`,borderRadius:8,padding:"5px 10px",color:groups.length>0?COLORS.pink:COLORS.muted,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>👨‍👩‍👧 Families{groups.length>0?` (${groups.length})`:""}</button>
            <button onClick={()=>setShowCatMgr(true)} style={{background:"none",border:`1px solid ${COLORS.border}`,borderRadius:8,padding:"5px 10px",color:COLORS.muted,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>🏷️ Categories</button>
            <button onClick={()=>{if(window.confirm("Reset all household data?")){setHousehold(null);setExpenses([]);setRecurring([]);setCustomCategories([]);setGroups([]);setPayments([]);}}} style={{background:"none",border:"none",color:COLORS.muted,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Reset</button>
          </div>
        </div>
        <div style={{padding:"24px 16px",maxWidth:800,margin:"0 auto"}}>
          {view==="Add Expense"&&<AddExpenseView members={household} groups={groups} currentUser={currentUser} onChangeUser={setCurrentUser} onAdd={e=>setExpenses(prev=>[e,...prev])} onAddRecurring={r=>setRecurring(prev=>[r,...prev])} customCategories={customCategories} onManageCategories={()=>setShowCatMgr(true)}/>}
          {view==="Expenses"&&<ExpensesView expenses={expenses} recurringExpenses={recurring} members={household} groups={groups} currentUser={currentUser} onDeleteRecurring={id=>setRecurring(prev=>prev.filter(r=>r.id!==id))} onDeleteExpense={id=>setExpenses(prev=>prev.filter(e=>e.id!==id))} onEditExpense={u=>setExpenses(prev=>prev.map(e=>e.id===u.id?u:e))} onEditRecurring={u=>setRecurring(prev=>prev.map(r=>r.id===u.id?u:r))} onMarkPaid={(id,paidBy)=>setExpenses(prev=>prev.map(e=>e.id===id?{...e,paidBy}:e))} allCategories={allCategories}/>}
          {view==="Payments"&&<PaymentsView payments={payments} members={household} groups={groups} onAdd={p=>setPayments(prev=>[p,...prev])} onDelete={id=>setPayments(prev=>prev.filter(p=>p.id!==id))} onEdit={u=>setPayments(prev=>prev.map(p=>p.id===u.id?u:p))}/>}
          {view==="Balance"&&<BalanceView expenses={expenses} payments={payments} members={household} groups={groups}/>}
          {view==="Reports"&&<ReportsView expenses={expenses} recurringExpenses={recurring} payments={payments} members={household} groups={groups} allCategories={allCategories}/>}
          {view==="Budget"&&<BudgetView expenses={expenses} recurringExpenses={recurring} members={household} groups={groups} allCategories={allCategories}/>}
          {view==="Summary"&&<SummaryView expenses={expenses} members={household} groups={groups} allCategories={allCategories}/>}
        </div>
      </div>);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

</body>
</html>
